name: DB Keepalive

on:
  schedule:
    # Every 12 hours (sufficient for inactivity-based pause prevention, less noisy)
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate required secret
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL secret is missing"
            exit 1
          fi

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Ping database directly
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -e
          CLEAN_DATABASE_URL="$(printf '%s' "$DATABASE_URL" | tr -d '\r\n' | sed -e 's/^"//' -e 's/"$//')"
          psql "$CLEAN_DATABASE_URL" -c "SELECT 1;"
          echo "Database keepalive ping succeeded"
