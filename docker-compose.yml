services:
  # -----------------------------
  # The Nervous System (Redis)
  # -----------------------------
  redis:
    image: redis:7-alpine
    container_name: krastix-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------
  # The Brain (Orchestrator)
  # -----------------------------
  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    container_name: krastix-orchestrator
    ports:
      - "8000:8000"
    restart: on-failure
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=${DATABASE_URL}
      - RESEARCH_AGENT_URL=http://research_agent:8001
      - DOC_AGENT_URL=http://doc_agent:8002
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - INTEGRATIONS_ENCRYPTION_KEY=${INTEGRATIONS_ENCRYPTION_KEY}
      - KEEPALIVE_TOKEN=${KEEPALIVE_TOKEN}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - GROK_API_KEY=${GROK_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./orchestrator:/app/orchestrator
      - ./shared:/app/shared
    command: uvicorn orchestrator.src.main:app --host 0.0.0.0 --port 8000 --reload

  # -----------------------------
  # Agent 1: CRM (Sales)
  # -----------------------------
  crm_agent:
    build:
      context: .
      dockerfile: agents/crm_agent/Dockerfile
    container_name: krastix-crm-agent
    restart: on-failure
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - INTEGRATIONS_ENCRYPTION_KEY=${INTEGRATIONS_ENCRYPTION_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - ORCHESTRATOR_URL=http://orchestrator:8000
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./agents/crm_agent:/app/agent
      - ./shared:/app/shared
    # Include agent.src.worker to register its tasks
    command: celery -A shared.mq:celery_app worker --loglevel=info -Q crm_queue --include=agent.src.worker

  # -----------------------------
  # Agent 2: Research (Deep Work)
  # -----------------------------
  research_agent:
    build:
      context: ./agents/research_agent
      dockerfile: Dockerfile
    container_name: krastix-research-agent
    ports:
      - "8001:8001"
    restart: on-failure
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:8000
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
      - SCRAPECREATORS_API_KEY=${SCRAPECREATORS_API_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
    volumes:
      - ./agents/research_agent:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8001 --reload

  # -----------------------------
  # Agent 3: Form (HR/Admin)
  # -----------------------------
  form_agent:
    build:
      context: .
      dockerfile: agents/form_agent/Dockerfile
    container_name: krastix-form-agent
    restart: on-failure
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - INTEGRATIONS_ENCRYPTION_KEY=${INTEGRATIONS_ENCRYPTION_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - ORCHESTRATOR_URL=http://orchestrator:8000
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./agents/form_agent:/app/agent
      - ./shared:/app/shared
    # Include agent.src.worker to register its tasks (assuming it has them)
    command: celery -A shared.mq:celery_app worker --loglevel=info -Q form_queue --include=agent.src.worker

  # -----------------------------
  # Agent 5: Communication (Gmail)
  # -----------------------------
  communication_agent:
    build:
      context: .
      dockerfile: agents/communication_agent/Dockerfile
    container_name: krastix-communication-agent
    restart: on-failure
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=${DATABASE_URL}
      - ORCHESTRATOR_URL=http://orchestrator:8000
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - INTEGRATIONS_ENCRYPTION_KEY=${INTEGRATIONS_ENCRYPTION_KEY}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./agents/communication_agent:/app/agent
      - ./shared:/app/shared
    command: celery -A shared.mq:celery_app worker --loglevel=info -Q communication_queue --include=agent.src.worker

  # -----------------------------
  # Frontend (React + Vite)
  # -----------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: krastix-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - orchestrator
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

  # -----------------------------
  # Agent 4: Document (VDU)
  # -----------------------------
  doc_agent:
    build:
      context: .
      dockerfile: agents/doc_agent/Dockerfile
    container_name: krastix-doc-agent
    ports:
      - "8002:8002"
    restart: on-failure
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - VLM_MODEL=${VLM_MODEL:-qwen2.5-vl:7b}
      - GROQ_API_KEY=${GROQ_API_KEY:-${GROK_API_KEY:-}}
      - GROQ_VISION_MODEL=${GROQ_VISION_MODEL:-llama-3.2-90b-vision-preview}
      - ORCHESTRATOR_URL=http://orchestrator:8000
      - STORAGE_BUCKET=${STORAGE_BUCKET:-documents}
    volumes:
      - ./agents/doc_agent/src:/app/src
      - ./shared:/app/shared
    command: uvicorn src.main:app --host 0.0.0.0 --port 8002 --reload

volumes:
  redis_data:
